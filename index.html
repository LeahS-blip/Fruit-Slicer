<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fruit Slicer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'DM Sans',sans-serif;overflow:hidden;cursor:none}
#wrapper{position:relative;width:700px;height:580px}
canvas{display:block;border-radius:6px;touch-action:none;cursor:none}

#hud{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:10}
#hud-top{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 20px 0;background:linear-gradient(to bottom,rgba(0,0,0,0.92) 0%,transparent 100%);padding-bottom:22px}
.hud-score{font-family:'Bebas Neue',sans-serif;font-size:38px;color:#fff;letter-spacing:2px;line-height:1}
.hud-label{font-size:10px;font-family:'DM Sans',sans-serif;font-weight:500;color:rgba(255,255,255,0.35);letter-spacing:3px;text-transform:uppercase;margin-bottom:2px}
.hud-lives{display:flex;gap:6px;align-items:center;padding-top:4px}
.heart{width:21px;height:21px;transition:transform 0.2s,opacity 0.3s}
.heart.lost{opacity:0.1;transform:scale(0.72)}
.hud-level{font-family:'Bebas Neue',sans-serif;font-size:38px;color:rgba(255,255,255,0.9);letter-spacing:2px;text-align:right;line-height:1}

#hud-mid{display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:10px}
#progress-wrap{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
#progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#ff6b35,#ffd700);border-radius:2px;transition:width 0.22s}
#hi-score-hud{font-family:'Bebas Neue',sans-serif;font-size:16px;color:rgba(255,215,0,0.45);letter-spacing:2px;white-space:nowrap}

#combo-bar{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;pointer-events:none;opacity:0;transition:opacity 0.18s;z-index:10;white-space:nowrap;text-align:center}

#powerup-bar{position:absolute;bottom:20px;left:20px;display:flex;gap:10px;pointer-events:none;z-index:10}
.pu-indicator{font-size:20px;opacity:0;transition:opacity 0.3s;position:relative;text-align:center}
.pu-indicator.active{opacity:1}
.pu-timer{position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);font-size:10px;font-family:'DM Sans',sans-serif;color:rgba(255,255,255,0.55);white-space:nowrap}

#fever-vignette{position:absolute;inset:0;border-radius:6px;pointer-events:none;z-index:5;opacity:0;transition:opacity 0.4s;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(255,40,0,0.45) 100%)}
#fever-vignette.active{opacity:1}

.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;z-index:20;transition:opacity 0.4s}
.screen.hidden{opacity:0;pointer-events:none}
#start-screen{background:#000;z-index:30}

.start-title{font-family:'Bebas Neue',sans-serif;font-size:90px;color:#fff;letter-spacing:8px;text-align:center;line-height:0.88}
.start-title em{font-style:normal;color:transparent;-webkit-text-stroke:1.5px rgba(255,255,255,0.22)}
.fruit-row{font-size:38px;margin:22px 0;letter-spacing:6px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

#perk-cards{display:flex;gap:14px;margin-top:24px;flex-wrap:wrap;justify-content:center;max-width:580px}
.perk-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:18px 16px;width:160px;cursor:pointer;transition:background 0.18s,border-color 0.2s,transform 0.15s;text-align:center;pointer-events:all}
.perk-card:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.4);transform:translateY(-3px)}
.perk-card.selected{background:rgba(255,215,0,0.12);border-color:#ffd700}
.perk-icon{font-size:36px;margin-bottom:10px;display:block}
.perk-name{font-family:'Bebas Neue',sans-serif;font-size:18px;color:#fff;letter-spacing:2px;margin-bottom:6px}
.perk-desc{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:1px;line-height:1.5}
.perk-tag{display:inline-block;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:2px 7px;border-radius:3px;margin-bottom:8px}
.perk-tag.blade{background:rgba(100,180,255,0.15);color:#64b4ff}
.perk-tag.combat{background:rgba(255,100,100,0.15);color:#ff6464}
.perk-tag.utility{background:rgba(100,255,150,0.15);color:#64ff96}

#ch-rules{display:flex;flex-direction:column;gap:8px;margin-top:16px;max-width:420px}
.ch-rule{background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.1);border-radius:8px;padding:9px 16px;font-size:13px;color:rgba(255,255,255,0.6);text-align:center}

#active-perks-bar{position:absolute;bottom:52px;right:16px;display:flex;flex-direction:column;gap:5px;pointer-events:none;z-index:10;align-items:flex-end}
.active-perk-pip{font-size:13px;background:rgba(0,0,0,0.55);border:0.5px solid rgba(255,255,255,0.15);border-radius:4px;padding:2px 6px;color:rgba(255,255,255,0.7);letter-spacing:1px}

#draft-screen{background:rgba(0,0,0,0.93);z-index:25}
#challenge-screen{background:rgba(0,0,0,0.93);z-index:25}
.lu-eyebrow{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:8px}
.lu-title{font-family:'Bebas Neue',sans-serif;font-size:80px;color:#fff;letter-spacing:6px;line-height:1}
.lu-subtitle{font-size:13px;color:rgba(255,255,255,0.35);letter-spacing:3px;text-transform:uppercase;margin-top:6px}
.over-title{font-family:'Bebas Neue',sans-serif;font-size:72px;color:#fff;letter-spacing:6px}
.over-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0;width:280px}
.over-stat{background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;text-align:center}
.over-stat-val{font-family:'Bebas Neue',sans-serif;font-size:32px;color:#ffd700;letter-spacing:2px}
.over-stat-lbl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-top:2px}
#new-hi{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#ffd700;margin-top:-6px;opacity:0;transition:opacity 0.5s}
#new-hi.show{opacity:1}

.btn{margin-top:18px;padding:13px 44px;background:transparent;border:1px solid rgba(255,255,255,0.2);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:3px;text-transform:uppercase;border-radius:2px;cursor:pointer;transition:background 0.2s,border-color 0.2s}
.btn:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.4)}
.hint{font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:3px;text-transform:uppercase;margin-top:14px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.2}50%{opacity:0.55}}
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="c" width="700" height="580"></canvas>
  <div id="fever-vignette"></div>

  <div id="hud">
    <div id="hud-top">
      <div><div class="hud-label">Score</div><div class="hud-score" id="score-val">0</div></div>
      <div style="text-align:center"><div class="hud-lives" id="lives-el"></div></div>
      <div style="text-align:right"><div class="hud-label">Level</div><div class="hud-level" id="level-val">1</div></div>
    </div>
    <div id="hud-mid">
      <div id="progress-wrap"><div id="progress-bar"></div></div>
      <div id="hi-score-hud">BEST: <span id="hi-val">0</span></div>
    </div>
  </div>

  <div id="combo-bar"></div>
  <div id="powerup-bar">
    <div class="pu-indicator" id="pu-freeze">❄️<span class="pu-timer" id="pu-freeze-t"></span></div>
    <div class="pu-indicator" id="pu-double">✨<span class="pu-timer" id="pu-double-t"></span></div>
    <div class="pu-indicator" id="pu-shield">🛡️<span class="pu-timer" id="pu-shield-t">READY</span></div>
  </div>

  <div id="active-perks-bar"></div>

  <div class="screen" id="start-screen">
    <div class="start-title">FRUIT<br><em>SLICER</em></div>
    <div class="fruit-row">🍉 🍊 🍋 🍇 🍓</div>
    <button class="btn" id="start-btn">Start Slicing</button>
    <div class="hint" style="margin-top:16px">Slice fruit · Avoid 💣 · Catch ❄️✨🛡️❤️ powerups</div>
  </div>

  <div class="screen hidden" id="draft-screen">
    <div class="lu-eyebrow" id="draft-eyebrow">Level Complete</div>
    <div class="lu-title">CHOOSE A PERK</div>
    <div class="lu-subtitle" id="draft-subtitle">Pick one upgrade</div>
    <div id="perk-cards"></div>
  </div>

  <div class="screen hidden" id="challenge-screen">
    <div class="lu-eyebrow">Challenge Round</div>
    <div class="lu-title" id="ch-title">CHALLENGE</div>
    <div class="lu-subtitle" id="ch-desc">Special rules apply</div>
    <div id="ch-rules"></div>
    <button class="btn" id="ch-btn" style="margin-top:26px">Accept Challenge</button>
  </div>

  <div class="screen hidden" id="over-screen">
    <div class="over-title">GAME OVER</div>
    <div id="new-hi">✦ NEW HIGH SCORE ✦</div>
    <div class="over-stats">
      <div class="over-stat"><div class="over-stat-val" id="ov-score">0</div><div class="over-stat-lbl">Score</div></div>
      <div class="over-stat"><div class="over-stat-val" id="ov-level">1</div><div class="over-stat-lbl">Level</div></div>
      <div class="over-stat"><div class="over-stat-val" id="ov-sliced">0</div><div class="over-stat-lbl">Sliced</div></div>
      <div class="over-stat"><div class="over-stat-val" id="ov-best">0</div><div class="over-stat-lbl">Best Combo</div></div>
    </div>
    <button class="btn" id="restart-btn">Play Again</button>
  </div>
</div>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const wrapper=document.getElementById('wrapper');

// ─── Audio ────────────────────────────────────────────────────────
const AC=new (window.AudioContext||window.webkitAudioContext)();
function resumeAC(){if(AC.state==='suspended')AC.resume();}

// Master compressor to prevent clipping
const masterComp=AC.createDynamicsCompressor();
masterComp.threshold.value=-18;masterComp.knee.value=12;
masterComp.ratio.value=4;masterComp.attack.value=0.003;masterComp.release.value=0.15;
masterComp.connect(AC.destination);

function tone(freq,type,vol,attack,decay,dest,startOffset=0){
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(dest||masterComp);
  o.type=type;o.frequency.value=freq;
  const t=AC.currentTime+startOffset;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+attack);
  g.gain.exponentialRampToValueAtTime(0.0001,t+attack+decay);
  o.start(t);o.stop(t+attack+decay+0.01);
  return o;
}

// Juicy whoosh-slice: layered noise burst + pitched transient
function playSlice(pitch=1){
  resumeAC();
  const t=AC.currentTime;
  // Noise component — fabric-tear texture
  const bufLen=Math.floor(AC.sampleRate*0.12);
  const buf=AC.createBuffer(1,bufLen,AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<bufLen;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/bufLen,2);
  const ns=AC.createBufferSource();ns.buffer=buf;
  const nf=AC.createBiquadFilter();nf.type='bandpass';nf.frequency.value=3200*pitch;nf.Q.value=0.8;
  const ng=AC.createGain();ng.gain.setValueAtTime(0.22,t);ng.gain.exponentialRampToValueAtTime(0.0001,t+0.11);
  ns.connect(nf);nf.connect(ng);ng.connect(masterComp);ns.start(t);
  // Pitched transient — bright sine click
  const o=AC.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(1400*pitch,t);
  o.frequency.exponentialRampToValueAtTime(300*pitch,t+0.07);
  const og=AC.createGain();og.gain.setValueAtTime(0.14,t);og.gain.exponentialRampToValueAtTime(0.0001,t+0.07);
  o.connect(og);og.connect(masterComp);o.start(t);o.stop(t+0.08);
}

// Warm rising chime — 3-note major arpeggio with soft sine + gentle harmonic
function playHeart(){
  resumeAC();
  const notes=[523.25,659.26,783.99]; // C5 E5 G5
  notes.forEach((f,i)=>{
    const t=AC.currentTime+i*0.1;
    // Fundamental
    tone(f,'sine',0.14,0.015,0.55,masterComp,i*0.1);
    // Octave harmonic — much softer
    tone(f*2,'sine',0.04,0.01,0.35,masterComp,i*0.1);
  });
}

// Deep punchy boom — layered noise + low sine thud
function playBoom(){
  resumeAC();
  const t=AC.currentTime;
  // Low sine thud
  const o=AC.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(120,t);o.frequency.exponentialRampToValueAtTime(40,t+0.25);
  const og=AC.createGain();og.gain.setValueAtTime(0.7,t);og.gain.exponentialRampToValueAtTime(0.0001,t+0.35);
  o.connect(og);og.connect(masterComp);o.start(t);o.stop(t+0.36);
  // Noise body
  const bufLen=Math.floor(AC.sampleRate*0.4);
  const buf=AC.createBuffer(1,bufLen,AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<bufLen;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/bufLen,1.2)*0.6;
  const ns=AC.createBufferSource();ns.buffer=buf;
  const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=280;
  const ng=AC.createGain();ng.gain.setValueAtTime(0.5,t);ng.gain.exponentialRampToValueAtTime(0.0001,t+0.38);
  ns.connect(lp);lp.connect(ng);ng.connect(masterComp);ns.start(t);
}

// Crisp staccato chord arpeggio for combos
function playCombo(tier){
  resumeAC();
  const scales=[[523,659],[523,659,784],[523,659,784,1047]];
  const freqs=scales[Math.min(tier-1,2)];
  freqs.forEach((f,i)=>{
    tone(f,'sine',0.12,0.008,0.18,masterComp,i*0.055);
    tone(f*1.5,'sine',0.04,0.005,0.12,masterComp,i*0.055);
  });
}

// Energetic fanfare — fast ascending sine arp
function playFever(){
  resumeAC();
  [523,659,784,880,1047,1319].forEach((f,i)=>{
    tone(f,'sine',0.1,0.01,0.22,masterComp,i*0.065);
  });
}

// Clean rising two-tone ping
function playShield(){
  resumeAC();
  tone(440,'sine',0.15,0.01,0.25,masterComp,0);
  tone(880,'sine',0.08,0.01,0.2,masterComp,0.08);
}

// Bright ascending fanfare
function playLevelUp(){
  resumeAC();
  [523,659,784,1047,1319,1568].forEach((f,i)=>{
    tone(f,'sine',0.11,0.012,0.35,masterComp,i*0.09);
    tone(f*1.25,'sine',0.035,0.008,0.25,masterComp,i*0.09);
  });
}

// ─── Screenshake ─────────────────────────────────────────────────
let shakeAmt=0,shakeX=0,shakeY=0;
function shake(amt){shakeAmt=Math.max(shakeAmt,amt);}

// ─── Level defs ──────────────────────────────────────────────────
const LEVELS=[
  {target:15,rate:95, maxBombs:0,bombC:0,   fastC:0,   goldC:0,   puC:0,   twin:false,triple:false,label:'Warm Up',     bgHue:220,perks:[]},
  {target:25,rate:78, maxBombs:1,bombC:0.13,fastC:0.12,goldC:0.06,puC:0.1, twin:false,triple:false,label:'Getting Hot', bgHue:30, perks:['Bombs 💣','Fast fruit 🏃','Golden fruit ⭐','Heart lives ❤️']},
  {target:40,rate:62, maxBombs:2,bombC:0.2, fastC:0.2, goldC:0.09,puC:0.12,twin:true, triple:false,label:'Sizzling',    bgHue:20, perks:['Freeze ❄️','Double ✨','Twin spawns','Shield 🛡️']},
  {target:55,rate:50, maxBombs:3,bombC:0.24,fastC:0.28,goldC:0.11,puC:0.13,twin:true, triple:false,label:'Blazing',     bgHue:10, perks:['More bombs','Faster fruit','Fruit patterns']},
  {target:75,rate:40, maxBombs:3,bombC:0.28,fastC:0.33,goldC:0.13,puC:0.14,twin:true, triple:true, label:'Inferno',    bgHue:0,  perks:['Triple spawns','Fever mode 🔥']},
  {target:999,rate:32,maxBombs:4,bombC:0.33,fastC:0.38,goldC:0.16,puC:0.15,twin:true, triple:true, label:'Chaos',      bgHue:300,perks:['No mercy']},
];

const FRUITS=[
  {emoji:'🍉',r:40,pts:1,hue:350},{emoji:'🍊',r:30,pts:1,hue:30},
  {emoji:'🍋',r:28,pts:1,hue:55},{emoji:'🍇',r:32,pts:2,hue:280},
  {emoji:'🍑',r:32,pts:1,hue:20},{emoji:'🍍',r:38,pts:3,hue:55},
  {emoji:'🥭',r:36,pts:2,hue:35},{emoji:'🍓',r:28,pts:1,hue:355},
  {emoji:'🍒',r:24,pts:2,hue:345},{emoji:'🥝',r:28,pts:1,hue:100},
];

const COMBO_TIERS=[
  {min:3,label:'HOT 🔥',color:'#ff9900',shadow:'rgba(255,150,0,0.9)'},
  {min:5,label:'BLAZING 🌟',color:'#ff5500',shadow:'rgba(255,80,0,0.9)'},
  {min:8,label:'INFERNO ☄️',color:'#ff2200',shadow:'rgba(255,30,0,1)'},
];
function getComboTier(c){
  let t=null;
  for(const ct of COMBO_TIERS)if(c>=ct.min)t=ct;
  return t;
}

let hiScore=parseInt(localStorage.getItem('fs_hi')||'0');
document.getElementById('hi-val').textContent=hiScore;

// ─── State ───────────────────────────────────────────────────────
let fruits,slices,particles,blade,bombs,powerups,ripples,trails,hearts;
let score,lives,combo,comboTimer,bestCombo,totalSliced;
let state,frame,spawnTimer,levelIdx,levelScore;
let freezeTimer,doubleTimer,shieldActive,feverTimer,feverActive;
let patternQueue,patternTimer,slowMoTimer;
let bladeIdleTimer,heartsSpawnedThisLevel;
let acquiredPerkIds=[];
const MAX_LIVES=6;
const mouse={x:W/2,y:H/2};
const rnd=(a,b)=>a+Math.random()*(b-a);
const getLvl=()=>LEVELS[Math.min(levelIdx,LEVELS.length-1)];

function initState(){
  fruits=[];slices=[];particles=[];blade=[];bombs=[];powerups=[];ripples=[];trails=[];hearts=[];
  score=0;lives=3;combo=0;comboTimer=0;bestCombo=0;totalSliced=0;
  state='playing';frame=0;spawnTimer=0;levelIdx=0;levelScore=0;
  freezeTimer=0;doubleTimer=0;shieldActive=false;feverTimer=0;feverActive=false;
  patternQueue=[];patternTimer=0;slowMoTimer=0;bladeIdleTimer=0;shakeAmt=0;heartsSpawnedThisLevel=0;
  bladeUpgrades={wide:false,long:false,fire:false,ice:false,magnet:false,golden:false,comboKeeper:false,bigSlice:false};
  acquiredPerkIds=[];activeChallenge=null;pendingChallenge=false;
  Object.assign(challengeState,{noMiss:false,bombRain:false,target:null,targetHits:0,targetGoal:10,speedTimer:0,speedGoal:15,speedHits:0});
  document.getElementById('active-perks-bar').innerHTML='';
  document.getElementById('fever-vignette').classList.remove('active');
  updateHUD();updateProgress();
}

// ─── HUD ─────────────────────────────────────────────────────────
function updateHUD(){
  document.getElementById('score-val').textContent=score;
  document.getElementById('level-val').textContent=levelIdx+1;
  const el=document.getElementById('lives-el');el.innerHTML='';
  const displayLives=Math.min(lives,MAX_LIVES);
  for(let i=0;i<Math.max(3,displayLives);i++){
    const filled=i<lives;
    const d=document.createElement('div');
    d.innerHTML=`<svg class="heart${!filled?' lost':''}" viewBox="0 0 24 24" fill="${filled?'#ff4d6d':'#1a1a1a'}"><path d="M12 21S3 13.5 3 8a5 5 0 0 1 9-3 5 5 0 0 1 9 3c0 5.5-9 13-9 13z"/></svg>`;
    el.appendChild(d.firstChild);
  }
}
function updateProgress(){
  const lvl=getLvl();
  document.getElementById('progress-bar').style.width=Math.min(100,levelScore/lvl.target*100)+'%';
}
function updateComboDisplay(){
  const el=document.getElementById('combo-bar');
  const tier=getComboTier(combo);
  if(tier&&combo>=3){
    el.innerHTML=`<span style="color:${tier.color};text-shadow:0 0 20px ${tier.shadow}">${combo}× ${tier.label}</span>`;
    el.style.opacity='1';
  } else if(combo>=3){
    el.style.opacity='1';
    el.innerHTML=`<span style="color:#ffd700">${combo}× COMBO</span>`;
  } else {
    el.style.opacity='0';
  }
}
function updatePU(){
  const fi=document.getElementById('pu-freeze'),di=document.getElementById('pu-double'),si=document.getElementById('pu-shield');
  fi.classList.toggle('active',freezeTimer>0);
  di.classList.toggle('active',doubleTimer>0);
  si.classList.toggle('active',shieldActive);
  if(freezeTimer>0)document.getElementById('pu-freeze-t').textContent=Math.ceil(freezeTimer/60)+'s';
  if(doubleTimer>0)document.getElementById('pu-double-t').textContent=Math.ceil(doubleTimer/60)+'s';
  document.getElementById('pu-shield-t').textContent=shieldActive?'READY':'';
}

// ─── Spawners ────────────────────────────────────────────────────
function mkFruit(fast,x){
  const f=FRUITS[Math.floor(Math.random()*FRUITS.length)];
  const spd=fast?rnd(-23,-18):rnd(-16,-11);
  return{...f,x:x||rnd(70,W-70),y:H+50,vx:rnd(-3,3),vy:spd,angle:rnd(0,Math.PI*2),va:rnd(-0.06,0.06),sliced:false,alpha:1,fast,trail:fast?[]:null};
}
function mkGolden(){
  return{emoji:'⭐',r:26,pts:5,hue:55,x:rnd(80,W-80),y:H+50,vx:rnd(-2,2),vy:rnd(-18,-14),angle:0,va:rnd(-0.03,0.03),sliced:false,alpha:1,golden:true,trail:null};
}
function mkBomb(){
  return{x:rnd(70,W-70),y:H+50,vx:rnd(-2,2),vy:rnd(-15,-11),angle:0,va:rnd(-0.05,0.05),r:30,sliced:false,alpha:1};
}
function mkPowerup(type){
  return{type,x:rnd(80,W-80),y:H+50,vx:rnd(-1.2,1.2),vy:rnd(-15,-12),r:26,sliced:false,alpha:1,angle:0,va:rnd(-0.025,0.025)};
}
function mkHeart(){
  return{x:rnd(80,W-80),y:H+50,vx:rnd(-1.5,1.5),vy:rnd(-17,-13),r:28,sliced:false,alpha:1,angle:0,va:rnd(-0.03,0.03)};
}
function spawnParticles(x,y,hue,n,big){
  const budget=Math.min(n, 120-particles.length);
  for(let i=0;i<budget;i++){
    const a=Math.random()*Math.PI*2,spd=rnd(2,big?9:6);
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,r:rnd(2,big?8:5),
      color:`hsl(${hue+rnd(-20,20)},90%,${rnd(55,75)}%)`,life:1,decay:rnd(0.02,0.04)});
  }
}
function addRipple(x,y,hue){
  ripples.push({x,y,r:0,maxR:70,hue,life:1});
}

function queuePattern(){
  if(patternQueue.length>0)return;
  const centerX=rnd(150,W-150);
  for(let i=0;i<5;i++){
    const ox=(i-2)*60;
    const vy=rnd(-17,-14);
    const vx=(i-2)*0.4;
    const f=FRUITS[Math.floor(Math.random()*FRUITS.length)];
    patternQueue.push({...f,x:centerX+ox,y:H+50,vx,vy,angle:rnd(0,Math.PI*2),va:rnd(-0.04,0.04),sliced:false,alpha:1,fast:false,trail:null,pattern:true});
  }
}

// ─── Collision ───────────────────────────────────────────────────
function segHitsCircle(ax,ay,bx,by,cx,cy,cr){
  const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
  if(l2<1)return false;
  const t=Math.max(0,Math.min(1,((cx-ax)*dx+(cy-ay)*dy)/l2));
  return (cx-(ax+t*dx))**2+(cy-(ay+t*dy))**2<(cr+10)**2;
}
function sliceCheck(fx,fy,fr){
  for(let i=0;i<blade.length-1;i++)
    if(segHitsCircle(blade[i].x,blade[i].y,blade[i+1].x,blade[i+1].y,fx,fy,fr))return true;
  return false;
}

// ─── Input ────────────────────────────────────────────────────────
function addBlade(x,y){
  blade.push({x,y});const maxLen=bladeUpgrades.long?36:26;if(blade.length>maxLen)blade.shift();bladeIdleTimer=0;
}
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouse.x=(e.clientX-r.left)*(W/r.width);mouse.y=(e.clientY-r.top)*(H/r.height);
  if(state==='playing')addBlade(mouse.x,mouse.y);
},{passive:true});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();const r=canvas.getBoundingClientRect(),t=e.touches[0];
  mouse.x=(t.clientX-r.left)*(W/r.width);mouse.y=(t.clientY-r.top)*(H/r.height);
  if(state==='playing')addBlade(mouse.x,mouse.y);
},{passive:false});
canvas.addEventListener('touchstart',e=>{e.preventDefault();blade=[];},{passive:false});
canvas.addEventListener('touchend',e=>{blade=[];});

// ─── Perk system ─────────────────────────────────────────────────
const ALL_PERKS=[
  {id:'extra_life',  icon:'❤️', name:'Extra Life',    tag:'utility', desc:'Start with +1 life right now',        apply:()=>{lives=Math.min(lives+1,MAX_LIVES);updateHUD();}},
  {id:'shield_start',icon:'🛡️', name:'Free Shield',  tag:'utility', desc:'Begin next level with shield active',  apply:()=>{shieldActive=true;}},
  {id:'double_start',icon:'✨', name:'2× Boost',      tag:'utility', desc:'Begin next level with double points',  apply:()=>{doubleTimer=300;}},
  {id:'freeze_start',icon:'❄️', name:'Deep Freeze',  tag:'utility', desc:'Begin next level with freeze active',  apply:()=>{freezeTimer=360;}},
  {id:'wide_blade',  icon:'⚔️', name:'Wide Blade',   tag:'blade',   desc:'Your blade is 2× thicker permanently', apply:()=>{bladeUpgrades.wide=true;}},
  {id:'long_blade',  icon:'🗡️', name:'Long Blade',   tag:'blade',   desc:'Blade leaves a longer trail',          apply:()=>{bladeUpgrades.long=true;}},
  {id:'fire_blade',  icon:'🔥', name:'Fire Blade',   tag:'blade',   desc:'Blade burns red — fire particle trail',apply:()=>{bladeUpgrades.fire=true;bladeUpgrades.ice=false;}},
  {id:'ice_blade',   icon:'🧊', name:'Ice Blade',    tag:'blade',   desc:'Blade crackles blue — ice crystal trail',apply:()=>{bladeUpgrades.ice=true;bladeUpgrades.fire=false;}},
  {id:'bomb_magnet', icon:'🧲', name:'Bomb Magnet',  tag:'combat',  desc:'Bombs are deflected — miss you 30% more',apply:()=>{bladeUpgrades.magnet=true;}},
  {id:'golden_touch',icon:'⭐', name:'Golden Touch', tag:'combat',  desc:'All fruit worth +1 bonus point',        apply:()=>{bladeUpgrades.golden=true;}},
  {id:'combo_keeper',icon:'💫', name:'Combo Keeper', tag:'combat',  desc:'Combo resets slower (90 frames)',       apply:()=>{bladeUpgrades.comboKeeper=true;}},
  {id:'big_slice',   icon:'💥', name:'Big Slice',    tag:'blade',   desc:'20% wider hit detection on all fruit', apply:()=>{bladeUpgrades.bigSlice=true;}},
];
let bladeUpgrades={wide:false,long:false,fire:false,ice:false,magnet:false,golden:false,comboKeeper:false,bigSlice:false};

function getSliceRadius(base){return bladeUpgrades.bigSlice?base*1.2:base;}

function pickDraftPerks(){
  const pool=ALL_PERKS.filter(p=>!acquiredPerkIds.includes(p.id)||(p.id==='extra_life'||p.id==='shield_start'||p.id==='double_start'||p.id==='freeze_start'));
  const shuffled=[...pool].sort(()=>Math.random()-0.5);
  return shuffled.slice(0,Math.min(3,shuffled.length));
}

function showDraftScreen(levelNum){
  const perks=pickDraftPerks();
  document.getElementById('draft-eyebrow').textContent=`Level ${levelNum} Complete`;
  document.getElementById('draft-subtitle').textContent='Pick one upgrade for the run';
  const container=document.getElementById('perk-cards');container.innerHTML='';
  perks.forEach(p=>{
    const card=document.createElement('div');card.className='perk-card';
    card.innerHTML=`<span class="perk-icon">${p.icon}</span><div class="perk-tag ${p.tag}">${p.tag}</div><div class="perk-name">${p.name}</div><div class="perk-desc">${p.desc}</div>`;
    card.addEventListener('click',()=>{
      resumeAC();
      p.apply();
      acquiredPerkIds.push(p.id);
      updateActivePerksBar();
      document.getElementById('draft-screen').classList.add('hidden');
      advanceToNextLevel();
    });
    container.appendChild(card);
  });
  document.getElementById('draft-screen').classList.remove('hidden');
}

function updateActivePerksBar(){
  const bar=document.getElementById('active-perks-bar');bar.innerHTML='';
  const bladeLabels={wide:'⚔️ Wide',long:'🗡️ Long',fire:'🔥 Fire',ice:'🧊 Ice',magnet:'🧲 Magnet',golden:'⭐ Golden',comboKeeper:'💫 Combo+',bigSlice:'💥 Big'};
  Object.entries(bladeUpgrades).forEach(([k,v])=>{
    if(v&&bladeLabels[k]){
      const pip=document.createElement('div');pip.className='active-perk-pip';pip.textContent=bladeLabels[k];
      bar.appendChild(pip);
    }
  });
}

// ─── Challenge rounds ─────────────────────────────────────────────
const CHALLENGES=[
  {id:'no_miss',  title:'NO MISS',      desc:'Don\'t let a single fruit fall',   rules:['Every missed fruit = instant game over','Slice everything that appears','Bombs still cost a life'],
   setup:()=>{challengeState.noMiss=true;},teardown:()=>{challengeState.noMiss=false;}},
  {id:'bomb_rain',title:'BOMB RAIN',    desc:'Survive the bomb storm',           rules:['Extra bombs this round','Shield powerup appears frequently','Score is doubled'],
   setup:()=>{challengeState.bombRain=true;}, teardown:()=>{challengeState.bombRain=false;}},
  {id:'target',   title:'TARGET FRUIT', desc:'Slice only the target fruit',      rules:['One fruit type is chosen as target','Slicing others loses a life','Hit the target 10 times to win'],
   setup:()=>{
     const f=FRUITS[Math.floor(Math.random()*FRUITS.length)];
     challengeState.target=f;challengeState.targetHits=0;challengeState.targetGoal=10;
   }, teardown:()=>{challengeState.target=null;}},
  {id:'speed',    title:'SPEED RUN',    desc:'Slice 15 fruit before time runs out',rules:['30-second timer','Miss nothing','Score multiplied by remaining time'],
   setup:()=>{challengeState.speedTimer=60*30;challengeState.speedGoal=15;challengeState.speedHits=0;},
   teardown:()=>{challengeState.speedTimer=0;}},
];
let challengeState={noMiss:false,bombRain:false,target:null,targetHits:0,targetGoal:10,speedTimer:0,speedGoal:15,speedHits:0};
let activeChallenge=null;
let pendingChallenge=false;

function triggerChallengeScreen(){
  const c=CHALLENGES[Math.floor(Math.random()*CHALLENGES.length)];
  activeChallenge=c;
  document.getElementById('ch-title').textContent=c.title;
  document.getElementById('ch-desc').textContent=c.desc;
  const rulesEl=document.getElementById('ch-rules');rulesEl.innerHTML='';
  c.rules.forEach(r=>{rulesEl.innerHTML+=`<div class="ch-rule">${r}</div>`;});
  document.getElementById('challenge-screen').classList.remove('hidden');
}
document.getElementById('ch-btn').addEventListener('click',()=>{
  resumeAC();
  document.getElementById('challenge-screen').classList.add('hidden');
  activeChallenge.setup();
  levelScore=0;fruits=[];bombs=[];powerups=[];slices=[];particles=[];ripples=[];hearts=[];
  patternQueue=[];spawnTimer=0;heartsSpawnedThisLevel=0;state='playing';
  updateHUD();updateProgress();
});

function checkChallengeWin(){
  if(!activeChallenge)return;
  let won=false;
  if(activeChallenge.id==='target'&&challengeState.targetHits>=challengeState.targetGoal)won=true;
  if(activeChallenge.id==='speed'&&challengeState.speedHits>=challengeState.speedGoal)won=true;
  if(won){
    activeChallenge.teardown();activeChallenge=null;
    Object.assign(challengeState,{noMiss:false,bombRain:false,target:null,targetHits:0,speedTimer:0,speedHits:0});
    slices.push({x:W/2,y:H/2-20,vy:-1.2,text:'🏆 CHALLENGE COMPLETE!',life:2,big:true,bad:false,gold:true,fever:false});
    playLevelUp();
    setTimeout(()=>showDraftScreen(levelIdx+1),900);
    state='levelup';blade=[];
  }
}

// ─── Level advance ────────────────────────────────────────────────
function triggerLevelUp(){
  state='levelup';blade=[];playLevelUp();
  // Every 3rd level transition = challenge first
  if((levelIdx+1)%3===0){
    pendingChallenge=true;
    setTimeout(()=>triggerChallengeScreen(),400);
  } else {
    setTimeout(()=>showDraftScreen(levelIdx+1),400);
  }
}

function advanceToNextLevel(){
  levelIdx=Math.min(levelIdx+1,LEVELS.length-1);
  levelScore=0;fruits=[];bombs=[];powerups=[];slices=[];particles=[];ripples=[];hearts=[];
  patternQueue=[];spawnTimer=0;heartsSpawnedThisLevel=0;state='playing';
  pendingChallenge=false;
  updateHUD();updateProgress();
}

// ─── Fever mode ───────────────────────────────────────────────────
function startFever(){
  if(feverActive)return;
  feverActive=true;feverTimer=60*8;
  document.getElementById('fever-vignette').classList.add('active');
  playFever();
  slices.push({x:W/2,y:H/2-30,vy:-1.5,text:'🔥 FEVER MODE! 🔥',life:1.5,big:true,bad:false,gold:true,fever:true});
}
function endFever(){
  feverActive=false;
  document.getElementById('fever-vignette').classList.remove('active');
}

// ─── Update ──────────────────────────────────────────────────────
function update(){
  frame++;
  const lvl=getLvl();

  shakeAmt*=0.82;
  shakeX=shakeAmt>0.3?rnd(-shakeAmt,shakeAmt):0;
  shakeY=shakeAmt>0.3?rnd(-shakeAmt,shakeAmt):0;
  canvas.style.transform=`translate(${shakeX}px,${shakeY}px)`;

  bladeIdleTimer++;if(bladeIdleTimer>7)blade=[];

  const prevSlowMo=slowMoTimer>0;
  if(slowMoTimer>0)slowMoTimer--;
  if(freezeTimer>0)freezeTimer--;
  if(doubleTimer>0)doubleTimer--;
  if(feverTimer>0){feverTimer--;if(feverTimer===0)endFever();}
  updatePU();

  if(comboTimer>0){comboTimer--;if(comboTimer===0){combo=0;updateComboDisplay();}}

  // Challenge timers
  if(challengeState.speedTimer>0){
    challengeState.speedTimer--;
    if(challengeState.speedTimer===0&&activeChallenge?.id==='speed'){
      // Time ran out — fail challenge, lose a life
      activeChallenge.teardown();activeChallenge=null;
      lives=Math.max(0,lives-1);shake(8);updateHUD();
      slices.push({x:W/2,y:H/2,vy:-1.2,text:'⏱️ TIME\'S UP!',life:1.5,big:true,bad:true,gold:false});
      if(lives===0){endGame();return;}
    }
  }

  const dt=lives===1&&!prevSlowMo?0.45:1;
  if(lives===1&&slowMoTimer===0)slowMoTimer=1;

  patternTimer++;
  if(patternTimer>400&&levelIdx>=3&&patternQueue.length===0&&Math.random()<0.008){
    patternTimer=0;queuePattern();
  }
  if(patternQueue.length>0){
    const p=patternQueue.shift();
    fruits.push(p);
  }

  spawnTimer++;
  const effectiveRate=feverActive?Math.max(18,lvl.rate*0.45):lvl.rate;
  if(spawnTimer>=effectiveRate){
    spawnTimer=0;
    const fast=Math.random()<lvl.fastC;
    fruits.push(mkFruit(fast));
    if(lvl.twin)fruits.push(mkFruit(Math.random()<lvl.fastC));
    if(lvl.triple)fruits.push(mkFruit(false));
    if(Math.random()<lvl.goldC)fruits.push(mkGolden());
    if(bombs.filter(b=>!b.sliced).length<lvl.maxBombs&&Math.random()<(challengeState.bombRain?lvl.bombC*2.5:lvl.bombC))bombs.push(mkBomb());
    if(Math.random()<(challengeState.bombRain?lvl.puC*2:lvl.puC))powerups.push(mkPowerup(challengeState.bombRain&&Math.random()<0.5?'shield':['freeze','double','shield'][Math.floor(Math.random()*3)]));
    // Exactly 2 hearts per level: spawn at ~33% and ~66% progress
    if(heartsSpawnedThisLevel<2){
      const threshold=heartsSpawnedThisLevel===0?0.33:0.66;
      if(levelScore/lvl.target>=threshold){
        hearts.push(mkHeart());heartsSpawnedThisLevel++;
      }
    }
  }

  const frozen=freezeTimer>0;
  const feverMult=feverActive?3:1;

  for(let f of fruits){
    if(f.fast&&f.trail&&!f.sliced){
      f.trail.push({x:f.x,y:f.y,life:1});
      if(f.trail.length>8)f.trail.shift();
      for(let t of f.trail)t.life-=0.15;
    }
  }

  for(let r of ripples){r.r+=4;r.life-=0.06;}
  ripples=ripples.filter(r=>r.life>0);

  // fruits
  for(let f of fruits){
    if(!frozen){f.x+=f.vx*dt;f.y+=f.vy*dt;f.vy+=0.42*dt;f.angle+=f.va*dt;}
    if(!f.sliced&&blade.length>=2&&sliceCheck(f.x,f.y,getSliceRadius(f.r))){
      f.sliced=true;combo++;comboTimer=bladeUpgrades.comboKeeper?90:62;totalSliced++;
      if(combo>bestCombo)bestCombo=combo;
      const tier=getComboTier(combo);
      if(tier&&combo%1===0)playCombo(COMBO_TIERS.indexOf(tier)+1);
      else playSlice(0.8+Math.random()*0.4);
      if(combo>=8&&!feverActive&&levelIdx>=4)startFever();
      // Target challenge check
      if(activeChallenge?.id==='target'&&challengeState.target){
        if(f.emoji===challengeState.target.emoji){
          challengeState.targetHits++;
          slices.push({x:f.x,y:f.y-30,vy:-1.5,text:`🎯 ${challengeState.targetHits}/${challengeState.targetGoal}`,life:0.8,big:false,bad:false,gold:true});
          checkChallengeWin();
        } else {
          lives=Math.max(0,lives-1);shake(6);updateHUD();
          slices.push({x:f.x,y:f.y,vy:-2,text:'✗ WRONG!',life:0.9,big:false,bad:true,gold:false});
          if(lives===0){endGame();return;}
        }
      }
      if(activeChallenge?.id==='speed'){
        challengeState.speedHits++;
        const secLeft=Math.ceil(challengeState.speedTimer/60);
        slices.push({x:f.x,y:f.y-30,vy:-1.4,text:`${challengeState.speedHits}/${challengeState.speedGoal} ⏱️${secLeft}s`,life:0.7,big:false,bad:false,gold:false});
        checkChallengeWin();
      }
      const bonusPts=bladeUpgrades.golden?1:0;
      const challengeMult=(challengeState.bombRain?2:1);
      const mult=(doubleTimer>0?2:1)*feverMult*(combo>=3?Math.min(combo,10):1)*challengeMult;
      const pts=f.pts*mult+bonusPts;
      score+=pts;levelScore+=f.pts;
      addRipple(f.x,f.y,f.golden?55:f.hue);
      spawnParticles(f.x,f.y,f.golden?55:f.hue,f.golden?22:14,f.golden);
      slices.push({x:f.x,y:f.y,vy:-2.5,text:`+${pts}`,life:1,big:combo>=3||f.golden,bad:false,gold:!!f.golden});
      updateHUD();updateProgress();updateComboDisplay();
      if(levelScore>=lvl.target&&state==='playing'&&!activeChallenge)triggerLevelUp();
    }
    if(f.sliced)f.alpha=Math.max(0,f.alpha-0.06);
  }

  // bombs
  for(let b of bombs){
    if(!frozen){b.x+=b.vx*dt;b.y+=b.vy*dt;b.vy+=0.42*dt;b.angle+=b.va*dt;}
    if(!b.sliced&&blade.length>=2&&sliceCheck(b.x,b.y,b.r)){
      b.sliced=true;
      if(shieldActive){
        shieldActive=false;playShield();
        spawnParticles(b.x,b.y,200,16,false);
        slices.push({x:b.x,y:b.y,vy:-2,text:'🛡️ BLOCKED!',life:1,big:true,bad:false,gold:false});
      } else {
        lives=Math.max(0,lives-1);
        playBoom();shake(12);
        spawnParticles(b.x,b.y,0,22,true);
        slices.push({x:b.x,y:b.y,vy:-2,text:'💥 BOOM',life:1,big:true,bad:true,gold:false});
        combo=0;comboTimer=0;updateComboDisplay();
        if(feverActive)endFever();
        updateHUD();
        if(lives===0){endGame();return;}
      }
    }
    if(b.sliced)b.alpha=Math.max(0,b.alpha-0.07);
  }

  // powerups
  for(let p of powerups){
    if(!frozen){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=0.38*dt;p.angle+=p.va*dt;}
    if(!p.sliced&&blade.length>=2&&sliceCheck(p.x,p.y,p.r)){
      p.sliced=true;
      if(p.type==='freeze'){freezeTimer=300;spawnParticles(p.x,p.y,200,16,false);}
      else if(p.type==='double'){doubleTimer=300;spawnParticles(p.x,p.y,55,16,false);}
      else{shieldActive=true;spawnParticles(p.x,p.y,180,16,false);}
      const labels={freeze:'❄️ FREEZE!',double:'✨ 2× POINTS!',shield:'🛡️ SHIELD!'};
      slices.push({x:p.x,y:p.y,vy:-2.5,text:labels[p.type],life:1,big:true,bad:false,gold:false});
      playSlice(1.5);
    }
    if(p.sliced)p.alpha=Math.max(0,p.alpha-0.07);
  }

  // hearts
  for(let h of hearts){
    if(!frozen){h.x+=h.vx*dt;h.y+=h.vy*dt;h.vy+=0.38*dt;h.angle+=h.va*dt;}
    if(!h.sliced&&blade.length>=2&&sliceCheck(h.x,h.y,h.r)){
      h.sliced=true;
      const gotLife=lives<MAX_LIVES;
      if(gotLife)lives++;
      playHeart();
      spawnParticles(h.x,h.y,345,22,true);
      slices.push({x:h.x,y:h.y,vy:-2.5,text:gotLife?'❤️ +1 LIFE!':'❤️ FULL!',life:1,big:true,bad:false,gold:false,heart:true});
      updateHUD();
    }
    if(h.sliced)h.alpha=Math.max(0,h.alpha-0.07);
  }

  // missed fruit
  fruits=fruits.filter(f=>{
    if(!f.sliced&&f.y>H+80&&f.vy>0){
      if(!f.golden){
        if(challengeState.noMiss){
          lives=0;endGame();return false;
        }
        lives=Math.max(0,lives-1);shake(5);updateHUD();if(lives===0){endGame();return false;}
      }
      return false;
    }
    return f.y<H+130&&f.alpha>0;
  });
  bombs=bombs.filter(b=>{
    if(!b.sliced&&b.y>H+80&&b.vy>0)return false;
    return b.y<H+120&&b.alpha>0;
  });
  // Bomb magnet — 30% chance deflect an incoming bomb
  if(bladeUpgrades.magnet){
    for(let b of bombs){
      if(!b.sliced&&b.vy>0&&Math.random()<0.005){b.vx+=rnd(-4,4);b.vy=-Math.abs(b.vy)*0.5;}
    }
  }
  powerups=powerups.filter(p=>p.y<H+120&&p.alpha>0);
  hearts=hearts.filter(h=>!h.sliced?h.y<H+120:h.alpha>0);

  for(let p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.vx*=0.97;p.life-=p.decay;}
  particles=particles.filter(p=>p.life>0);
  for(let s of slices){s.y+=s.vy;s.vy*=0.9;s.life-=s.fever?0.008:0.019;}
  slices=slices.filter(s=>s.life>0);
}

// ─── End game ─────────────────────────────────────────────────────
function endGame(){
  state='over';blade=[];playBoom();
  if(score>hiScore){
    hiScore=score;localStorage.setItem('fs_hi',hiScore);
    document.getElementById('hi-val').textContent=hiScore;
    setTimeout(()=>document.getElementById('new-hi').classList.add('show'),300);
  } else {
    document.getElementById('new-hi').classList.remove('show');
  }
  document.getElementById('ov-score').textContent=score;
  document.getElementById('ov-level').textContent=levelIdx+1;
  document.getElementById('ov-sliced').textContent=totalSliced;
  document.getElementById('ov-best').textContent=bestCombo;
  document.getElementById('over-screen').classList.remove('hidden');
}
document.getElementById('restart-btn').addEventListener('click',()=>{
  document.getElementById('over-screen').classList.add('hidden');
  document.getElementById('new-hi').classList.remove('show');
  initState();
});
document.getElementById('start-btn').addEventListener('click',()=>{
  resumeAC();
  document.getElementById('start-screen').classList.add('hidden');
  initState();
});

// ─── Draw ─────────────────────────────────────────────────────────
function drawBg(){
  const lvl=getLvl();
  const bgH=lvl.bgHue;
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  const g=ctx.createRadialGradient(W/2,H*0.65,0,W/2,H*0.65,W*0.85);
  g.addColorStop(0,`hsla(${bgH},40%,7%,1)`);
  g.addColorStop(1,'rgba(0,0,0,1)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  for(let i=0;i<100;i++){
    const b=0.06+((i*29)%10)*0.016;
    ctx.fillStyle=`rgba(255,255,255,${b})`;
    ctx.beginPath();ctx.arc((i*137+73)%W,(i*97+41)%H,0.7,0,Math.PI*2);ctx.fill();
  }

  if(feverActive){
    const pulse=0.1+0.06*Math.sin(frame*0.15);
    ctx.fillStyle=`rgba(255,30,0,${pulse})`;ctx.fillRect(0,0,W,H);
  }
  if(freezeTimer>0){
    ctx.fillStyle=`rgba(80,160,255,${Math.min(1,freezeTimer/60)*0.18})`;ctx.fillRect(0,0,W,H);
  }
  if(lives===1&&state==='playing'){
    const vg=ctx.createRadialGradient(W/2,H/2,W*0.2,W/2,H/2,W*0.7);
    vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(180,0,0,0.25)');
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  }
}

function drawBlade(){
  if(blade.length<2)return;
  const n=blade.length;
  const widthMult=bladeUpgrades.wide?2.2:1;
  const isFire=bladeUpgrades.fire,isIce=bladeUpgrades.ice;

  // Fire/ice particle trail
  if((isFire||isIce)&&n>3&&particles.length<80){
    const tip=blade[n-1],prev=blade[n-2];
    const dx=tip.x-prev.x,dy=tip.y-prev.y;
    if(dx*dx+dy*dy>16){
      const hue=isFire?rnd(10,40):rnd(190,230);
      particles.push({x:tip.x+rnd(-3,3),y:tip.y+rnd(-3,3),vx:rnd(-1,1),vy:isFire?rnd(-2.5,-0.5):rnd(-1.5,0.5),
        r:rnd(2,4),color:`hsl(${hue},100%,${isFire?65:75}%)`,life:0.85,decay:rnd(0.07,0.12)});
    }
  }

  // Wide soft glow — plain thick transparent stroke, no filter/shadow
  ctx.beginPath();
  ctx.moveTo(blade[0].x,blade[0].y);
  for(let i=1;i<n;i++)ctx.lineTo(blade[i].x,blade[i].y);
  ctx.strokeStyle=isFire?'rgba(255,100,20,0.18)':isIce?'rgba(80,200,255,0.18)':'rgba(255,255,200,0.15)';
  ctx.lineWidth=(12+widthMult*4);ctx.lineCap='round';ctx.lineJoin='round';
  ctx.stroke();

  // Tapered core — segments with increasing alpha/width
  ctx.lineCap='round';ctx.lineJoin='round';
  for(let i=1;i<n;i++){
    const t=i/n;
    ctx.beginPath();
    ctx.moveTo(blade[i-1].x,blade[i-1].y);ctx.lineTo(blade[i].x,blade[i].y);
    if(isFire)      ctx.strokeStyle=`hsla(${20+t*20},100%,65%,${t*0.95})`;
    else if(isIce)  ctx.strokeStyle=`hsla(${200+t*15},100%,78%,${t*0.95})`;
    else            ctx.strokeStyle=`rgba(255,255,240,${t*0.95})`;
    ctx.lineWidth=(t*5+1)*widthMult;
    ctx.stroke();
  }

  // Tip dot
  const tip=blade[n-1];
  ctx.beginPath();ctx.arc(tip.x,tip.y,4*(bladeUpgrades.wide?1.4:1),0,Math.PI*2);
  ctx.fillStyle=isFire?'rgba(255,180,60,1)':isIce?'rgba(160,235,255,1)':'rgba(255,255,230,1)';
  ctx.fill();
}

function drawHalo(x,y,r,hue,intensity=1){
  const g=ctx.createRadialGradient(x,y,r*0.2,x,y,r*2.5);
  g.addColorStop(0,`hsla(${hue},100%,65%,${0.3*intensity})`);
  g.addColorStop(1,`hsla(${hue},100%,50%,0)`);
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r*2.5,0,Math.PI*2);ctx.fill();
}

function drawEmoji(e,x,y,sz,angle,alpha){
  ctx.save();ctx.globalAlpha=alpha;ctx.translate(x,y);ctx.rotate(angle);
  ctx.font=`${sz}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(e,0,0);ctx.restore();
}

function drawGame(){
  drawBg();

  // Reset all state cleanly at start of each frame
  ctx.shadowBlur=0;ctx.filter='none';ctx.globalAlpha=1;

  // Ripples — no shadow, just colored rings
  for(let r of ripples){
    ctx.globalAlpha=r.life*0.5;
    ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
    ctx.strokeStyle=`hsl(${r.hue},100%,75%)`;ctx.lineWidth=3;
    ctx.stroke();
  }
  ctx.globalAlpha=1;

  // Particles — batch all as plain filled circles, no shadow
  for(let p of particles){
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Fruits
  for(let f of fruits){
    if(!f.sliced){
      if(f.fast&&f.trail){
        for(let i=0;i<f.trail.length;i++){
          const t=f.trail[i];
          ctx.globalAlpha=t.life*0.3;
          ctx.font=`${f.r*1.4}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText(f.emoji,t.x,t.y);
        }
        ctx.globalAlpha=1;
      }
      drawHalo(f.x,f.y,f.r,f.golden?55:f.hue,f.golden?2.4:1);
      drawEmoji(f.emoji,f.x,f.y,f.r*(f.golden?1.75:1.6),f.angle,1);
    } else if(f.alpha>0){
      drawEmoji(f.emoji,f.x-16,f.y-11,f.r*1.4,f.angle-0.55,f.alpha);
      drawEmoji(f.emoji,f.x+16,f.y+11,f.r*1.4,f.angle+0.55,f.alpha);
    }
  }

  // Bombs — no shadow
  for(let b of bombs){
    if(!b.sliced) drawEmoji('💣',b.x,b.y,50,b.angle,b.alpha);
  }

  // Powerups — simple ring, no shadow
  for(let p of powerups){
    if(!p.sliced){
      const col=p.type==='freeze'?'rgba(100,190,255,0.8)':p.type==='shield'?'rgba(100,255,180,0.8)':'rgba(255,215,0,0.8)';
      ctx.globalAlpha=p.alpha;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r+5+Math.sin(frame*0.1)*2,0,Math.PI*2);
      ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke();
      ctx.globalAlpha=1;
      const icons={freeze:'❄️',double:'✨',shield:'🛡️'};
      drawEmoji(icons[p.type],p.x,p.y,38,p.angle,p.alpha);
    }
  }

  // Hearts — simple ring, no shadow
  for(let h of hearts){
    if(!h.sliced){
      const pulse=Math.sin(frame*0.12)*3;
      ctx.globalAlpha=h.alpha;
      ctx.beginPath();ctx.arc(h.x,h.y,h.r+6+pulse,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,80,120,0.8)';ctx.lineWidth=2;ctx.stroke();
      ctx.globalAlpha=1;
      drawEmoji('❤️',h.x,h.y,46,h.angle,h.alpha);
    }
  }

  drawBlade();

  // Score popups
  ctx.textAlign='center';
  for(let s of slices){
    ctx.globalAlpha=Math.min(1,s.life*(s.fever?0.8:2));
    if(s.fever)     {ctx.font=`500 28px 'DM Sans',sans-serif`;ctx.fillStyle='#ff6622';}
    else if(s.heart){ctx.font=`500 22px 'DM Sans',sans-serif`;ctx.fillStyle='#ff6b8a';}
    else if(s.gold) {ctx.font=`500 24px 'DM Sans',sans-serif`;ctx.fillStyle='#ffd700';}
    else if(s.bad)  {ctx.font=`500 20px 'DM Sans',sans-serif`;ctx.fillStyle='#ff4466';}
    else if(s.big)  {ctx.font=`500 22px 'DM Sans',sans-serif`;ctx.fillStyle='#ffd700';}
    else            {ctx.font=`500 16px 'DM Sans',sans-serif`;ctx.fillStyle='#a8ff78';}
    ctx.fillText(s.text,s.x,s.y);
  }
  ctx.globalAlpha=1;

  // Challenge HUD overlay
  if(activeChallenge){
    ctx.textAlign='center';
    if(activeChallenge.id==='target'&&challengeState.target){
      ctx.font=`500 13px 'DM Sans',sans-serif`;ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.fillText('SLICE ONLY',W/2,H-38);
      ctx.font=`36px serif`;ctx.fillText(challengeState.target.emoji,W/2,H-14);
    }
    if(activeChallenge.id==='speed'&&challengeState.speedTimer>0){
      const sec=Math.ceil(challengeState.speedTimer/60);
      const pct=challengeState.speedTimer/(60*30);
      ctx.font=`500 13px 'DM Sans',sans-serif`;ctx.fillStyle=sec<=10?'#ff4466':'rgba(255,255,255,0.5)';
      ctx.fillText(`⏱ ${sec}s  —  ${challengeState.speedHits}/${challengeState.speedGoal} fruit`,W/2,H-18);
      ctx.fillStyle=sec<=10?'rgba(255,60,80,0.3)':'rgba(255,255,255,0.08)';
      ctx.fillRect(0,H-4,W,4);
      ctx.fillStyle=sec<=10?'#ff4466':'#ffd700';
      ctx.fillRect(0,H-4,W*pct,4);
    }
    if(activeChallenge.id==='no_miss'){
      ctx.font=`500 11px 'DM Sans',sans-serif`;ctx.fillStyle='rgba(255,100,100,0.6)';
      ctx.fillText('⚠ NO MISS MODE',W/2,H-18);
    }
    if(activeChallenge.id==='bomb_rain'){
      ctx.font=`500 11px 'DM Sans',sans-serif`;ctx.fillStyle='rgba(255,150,0,0.6)';
      ctx.fillText('💣 BOMB RAIN — 2× SCORE',W/2,H-18);
    }
  }

  // Cursor — always drawn last, always clean state
  ctx.shadowBlur=0;ctx.filter='none';ctx.globalAlpha=1;
  const cx=mouse.x,cy=mouse.y;
  ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(cx,cy,7,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,1)';
  ctx.beginPath();ctx.arc(cx,cy,2,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.45)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx-13,cy);ctx.lineTo(cx-9,cy);
  ctx.moveTo(cx+9,cy);ctx.lineTo(cx+13,cy);
  ctx.moveTo(cx,cy-13);ctx.lineTo(cx,cy-9);
  ctx.moveTo(cx,cy+9);ctx.lineTo(cx,cy+13);
  ctx.stroke();
}

function loop(){if(state==='playing')update();drawGame();requestAnimationFrame(loop);}
initState();state='idle';loop();
</script>
